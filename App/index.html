<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />

    <!-- Favicon — replace with your actual logo -->
    <link rel="icon" type="image/png" href="/favicon.png" />

    <!-- Viewport -->
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <!-- Primary Meta -->
    <title>ShopCo - NxtGen Shopping</title>
    <meta
      name="description"
      content="Get latest products you'll actually love. Browse electonics, clothing and more."
    />
    <meta name="author" content="Shubham Salunke" />

    <!-- Open Graph (WhatsApp, LinkedIn, Facebook link previews) -->
    <meta property="og:title" content="ShopCo - NxtGen Shopping" />
    <meta
      property="og:description"
      content="Get latest products you'll actually love."
    />
    <meta property="og:image" content="/og-image.png" />
    <meta property="og:url" content="https://your-vercel-url.vercel.app" />
    <meta property="og:type" content="website" />

    <!-- Twitter/X Card -->
    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:title" content="ShopCo - NxtGen Shopping" />
    <meta
      name="twitter:description"
      content="Get latest products you'll actually love."
    />
    <meta name="twitter:image" content="/og-image.png" />

    <!-- Theme color (browser UI color on mobile) -->
    <meta name="theme-color" content="#000000" />
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
